<!DOCTYPE html>
<html>
	<head>
		<title>WebView Lanjutan</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
	</head>
	<body class="bg-light">
		<div class="container p-4">
			<div class="row flex-column gap-3">
				<div class="col-12 text-center">
					<h2 class="fw-bold">WebView Lanjutan</h2>
				</div>
				<div class="col-md-12 col-lg-5">
					<h4>JavaScript</h4>
					<div class="d-flex flex-column w-100 gap-1">
						<button class="btn btn-primary" onclick="alert('Halo, ini dari JavaScript!');">
							Alert dari JavaScript
						</button>
					</div>
				</div>
				<div class="col-md-12 col-lg-5">
					<h4>Android</h4>
					<div class="d-flex flex-column w-100 gap-1">
						<button
							class="btn btn-success mb-2"
							onclick="showAndroidToast('Hello, ini Toast dari JavaScript');"
						>
							Toast dari JavaScript
						</button>
						<button class="btn btn-warning" onclick="showAndroidSms()">
							Memanggil Activity SMS dari JavaScript
						</button>
						<button class="btn btn-info mt-2" onclick="showAndroidWhatsApp()">
							Mengirim WhatsApp dari JavaScript
						</button>
					</div>
				</div>
				<div class="col-md-12 col-lg-5">
					<h4>Windows</h4>
					<div class="d-flex flex-column w-100 gap-1">
						<button
							class="btn btn-secondary mb-2"
							onclick="showWindowsMessageBox('Hello, ini MessageBox dari Windows');"
						>
							MessageBox dari Windows
						</button>
						<button class="btn btn-dark" onclick="showWindowsFontDialog();">FontDialog dari Windows</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Bootstrap JS Bundle -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script type="text/javascript">
			// Fungsi-fungsi berikut hanya untuk aplikasi Android

			function showAndroidSms() {
				if (typeof Android !== "undefined" || Android !== null) {
					Android.showSms();
				} else {
					alert("Object not found");
				}
			}

			function showAndroidToast(message) {
				if (typeof Android !== "undefined" || Android !== null) {
					Android.showToast(message);
				} else {
					alert("Object not found");
				}
			}

			function showAndroidWhatsApp() {
				const nomorHP = "+6282353505480";
				const message = "Hai, Feryandi! Lagi dimana?";

				if (typeof Android !== "undefined" || Android !== null) {
					Android.showWhatsApp(nomorHP, message);
				} else {
					alert("Object not found");
				}
			}
		</script>
		<script type="text/javascript">
			// Fungsi-fungsi berikut hanya untuk aplikasi Windows

			function showWindowsFontDialog() {
				var option = {
					view: window,
					bubbles: false,
					cancelable: false,
					data: "",
				};

				event = new MessageEvent("ShowFontDialog", option);
				document.dispatchEvent(event);
			}

			function showWindowsMessageBox(message) {
				var option = {
					view: window,
					bubbles: false,
					cancelable: false,
					data: message,
				};

				event = new MessageEvent("ShowMessageBox", option);
				document.dispatchEvent(event);
			}
		</script>
	</body>
</html>
